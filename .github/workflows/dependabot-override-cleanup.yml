name: Apply Dependabot override cleanup

on:
  push:
    branches:
      - fix/dependabot-override-parser

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove redundant vulnerable-range overrides
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          removals = {
              "pnpm-workspace.yaml": [
                  "  'brace-expansion@<1.1.16': 1.1.16\n",
                  "  'brace-expansion@>=2.0.0 <2.1.2': 2.1.2\n",
                  "  'dompurify@<=3.4.11': 3.4.12\n",
                  "  'fast-uri@>=3.0.0 <=3.1.3': 3.1.4\n",
              ],
              "pnpm-lock.yaml": [
                  "  brace-expansion@<1.1.16: 1.1.16\n",
                  "  brace-expansion@>=2.0.0 <2.1.2: 2.1.2\n",
                  "  dompurify@<=3.4.11: 3.4.12\n",
                  "  fast-uri@>=3.0.0 <=3.1.3: 3.1.4\n",
              ],
          }

          for filename, lines in removals.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for line in lines:
                  if text.count(line) != 1:
                      raise SystemExit(f"Expected exactly one occurrence in {filename}: {line.strip()}")
                  text = text.replace(line, "")
              path.write_text(text, encoding="utf-8")

          workspace = Path("pnpm-workspace.yaml").read_text(encoding="utf-8")
          lockfile = Path("pnpm-lock.yaml").read_text(encoding="utf-8")
          required = (
              "'minimatch@<3.1.4': 3.1.4",
              "brace-expansion@1.1.16:",
              "brace-expansion@2.1.2:",
              "dompurify@3.4.12:",
              "fast-uri@3.1.4:",
              "svgo@4.0.2:",
          )
          if required[0] not in workspace:
              raise SystemExit("The unrelated minimatch override was unexpectedly removed")
          for marker in required[1:]:
              if marker not in lockfile:
                  raise SystemExit(f"Expected patched lockfile entry is missing: {marker}")

          Path(".github/workflows/dependabot-override-cleanup.yml").unlink()
          PY

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-workspace.yaml pnpm-lock.yaml .github/workflows/dependabot-override-cleanup.yml
          git commit -m "chore: remove redundant dependency overrides"
          git push
