name: One-time upstream merge

on:
  push:
    branches:
      - sync/upstream-merge-2026-07-07

permissions:
  contents: write

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: sync/upstream-merge-2026-07-07
          fetch-depth: 0

      - name: Merge Vendicated/Vencord main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Vendicated/Vencord.git
          git fetch upstream main

          set +e
          git merge --no-ff --no-edit upstream/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            git merge --abort
            {
              echo "Upstream merge conflicts"
              echo
              echo "Upstream: Vendicated/Vencord@94cc541e38905063988094249a40e618f83a12e4"
              echo "Fork base: 427211264ab04830e58f766acc778bf389192c74"
              echo
              printf '%s\n' "$conflicts"
            } > UPSTREAM_MERGE_CONFLICTS.txt

            rm .github/workflows/one-time-upstream-merge.yml
            git add UPSTREAM_MERGE_CONFLICTS.txt .github/workflows/one-time-upstream-merge.yml
            git commit -m "chore: record upstream merge conflicts"
            git push origin HEAD:sync/upstream-merge-2026-07-07
            exit 0
          fi

          rm .github/workflows/one-time-upstream-merge.yml
          git add .github/workflows/one-time-upstream-merge.yml
          git commit -m "chore: remove one-time upstream merge workflow"
          git push origin HEAD:sync/upstream-merge-2026-07-07
