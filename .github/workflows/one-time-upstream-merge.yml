name: One-time upstream merge

on:
  push:
    branches:
      - sync/upstream-merge-2026-07-07

permissions:
  contents: write

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: sync/upstream-merge-2026-07-07
          fetch-depth: 0

      - name: Merge Vendicated/Vencord main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Vendicated/Vencord.git
          git fetch upstream main

          set +e
          git merge --no-ff --no-edit upstream/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            echo "::error::Upstream merge has conflicts"
            echo "Conflicted files:"
            git diff --name-only --diff-filter=U
            exit "$merge_status"
          fi

      - name: Remove one-time workflow
        run: |
          rm .github/workflows/one-time-upstream-merge.yml
          git add .github/workflows/one-time-upstream-merge.yml
          git commit -m "chore: remove one-time upstream merge workflow"

      - name: Push merged branch
        run: git push origin HEAD:sync/upstream-merge-2026-07-07
