name: Apply final CodeQL matcher fix

on:
    push:
        branches:
            - security/dependabot-codeql-hardening
        paths:
            - .github/workflows/fix-codeql-alerts.yml

permissions:
    contents: write

jobs:
    patch:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: security/dependabot-codeql-hardening

            - name: Replace ambiguous shared matcher
              run: |
                  python - <<'PY'
                  from pathlib import Path

                  path = Path("src/webpack/webpack.ts")
                  text = path.read_text()
                  old = 'export const DefaultExtractAndLoadChunksRegex = /(?:(?:Promise\\.all\\(\\[)?((?:\\i\\.e\\("?[^)]+?"?\\),?)+?)(?:\\]\\))?|Promise\\.resolve\\(\\))\\.then\\(\\i\\.bind\\(\\i,"?([^)]+?)"?\\)\\)/; // codeql[js/redos]'
                  new = 'export const DefaultExtractAndLoadChunksRegex = /(?:(?:Promise\\.all\\(\\[)?(\\i\\.e\\([^)]*\\)(?:,\\i\\.e\\([^)]*\\))*)(?:\\]\\))?|Promise\\.resolve\\(\\))\\.then\\(\\i\\.bind\\(\\i,"?([^",)]+)"?\\)\\)/;'
                  if old not in text:
                      raise SystemExit("Expected shared matcher was not found")
                  path.write_text(text.replace(old, new, 1))
                  PY

            - name: Remove helper and commit
              run: |
                  rm .github/workflows/fix-codeql-alerts.yml
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add src/webpack/webpack.ts .github/workflows/fix-codeql-alerts.yml
                  git commit -m "security: make shared chunk matcher linear"
                  git push origin HEAD:security/dependabot-codeql-hardening
