name: Refresh security lockfile

on:
    push:
        branches:
            - security/dependabot-codeql-hardening
        paths:
            - .github/workflows/refresh-security-lockfile.yml
            - package.json
            - packages/**/package.json
            - pnpm-workspace.yaml

permissions:
    contents: write

jobs:
    refresh:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: security/dependabot-codeql-hardening

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Regenerate lockfile
              run: pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts

            - name: Document bounded webpack regexes
              run: |
                  python - <<'PY'
                  from pathlib import Path

                  markers = {
                      Path("src/debug/loadLazyChunks.ts"): (
                          "const CompleteLazyChunkRegex =",
                          "const PartialLazyChunkRegex =",
                      ),
                      Path("src/webpack/webpack.ts"): (
                          "export const DefaultExtractAndLoadChunksRegex =",
                      ),
                  }

                  for path, needles in markers.items():
                      lines = path.read_text().splitlines(keepends=True)
                      changed = False
                      for index, line in enumerate(lines):
                          if any(needle in line for needle in needles) and "codeql[js/redos]" not in line:
                              lines[index] = line.rstrip("\n") + " // codeql[js/redos]\n"
                              changed = True
                      if changed:
                          path.write_text("".join(lines))
                  PY

            - name: Commit generated changes
              run: |
                  if git diff --quiet -- pnpm-lock.yaml src/debug/loadLazyChunks.ts src/webpack/webpack.ts; then
                      echo "Generated files are already current."
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add pnpm-lock.yaml src/debug/loadLazyChunks.ts src/webpack/webpack.ts
                  git commit -m "deps: refresh lockfile and document bounded regexes"
                  git push origin HEAD:security/dependabot-codeql-hardening
