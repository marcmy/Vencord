name: Refresh security lockfile

on:
    push:
        branches:
            - security/dependabot-codeql-hardening
        paths:
            - .github/workflows/refresh-security-lockfile.yml
            - package.json
            - packages/**/package.json
            - pnpm-workspace.yaml

permissions:
    contents: write

jobs:
    refresh:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: security/dependabot-codeql-hardening

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Regenerate lockfile
              run: pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts

            - name: Commit lockfile
              run: |
                  if git diff --quiet -- pnpm-lock.yaml; then
                      echo "Lockfile is already current."
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add pnpm-lock.yaml
                  git commit -m "deps: refresh lockfile after security overrides"
                  git push origin HEAD:security/dependabot-codeql-hardening
