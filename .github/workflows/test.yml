name: test
on:
    push:
    pull_request:
        branches:
            - custom-plugins
            - main
            - dev

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6 # Install pnpm using packageManager key in package.json

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Test if desktop version compiles
              run: pnpm buildStandalone

            - name: Type-check
              run: pnpm testTsc

            - name: Lint TypeScript and JavaScript
              run: pnpm lint

            - name: Lint styles
              run: pnpm lint-styles

            - name: Test if web version compiles
              run: pnpm buildWeb

            - name: Test if plugin structure is valid
              run: pnpm generatePluginJson
