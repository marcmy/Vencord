name: One-time inline CodeQL suppressions

on:
  push:
    branches:
      - security/inline-codeql-suppressions

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: security/inline-codeql-suppressions
          fetch-depth: 0

      - name: Place suppressions on exact sink lines
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dev = Path("src/plugins/devCompanion.dev/index.tsx")
          text = dev.read_text(encoding="utf-8")

          replacements = [
              (
                  '            // Dev Companion is a developer-only localhost protocol whose purpose is testing developer-authored regexes. codeql[js/regex-injection]\n'
                  '            return new RegExp(pattern, flags);',
                  '            // Dev Companion is a developer-only localhost protocol whose purpose is testing developer-authored regexes.\n'
                  '            return new RegExp(pattern, flags); // codeql[js/regex-injection]'
              ),
              (
                  "            // The evaluated function runs in Discord's browser sandbox; the companion process already has host access. codeql[js/code-injection]\n"
                  '            return (0, eval)(node.value);',
                  "            // The evaluated function runs in Discord's browser sandbox; the companion process already has host access.\n"
                  '            return (0, eval)(node.value); // codeql[js/code-injection]'
              ),
          ]

          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"Expected exactly one match in {dev}: {old!r}")
              text = text.replace(old, new, 1)

          dev.write_text(text, encoding="utf-8")

          patches = Path("src/utils/patches.ts")
          text = patches.read_text(encoding="utf-8")
          old = (
              "    // The input is a RegExp supplied by trusted plugin/developer code; only Vencord's fixed placeholder is expanded.\n"
              '    // lgtm[js/regex-injection]\n'
              '    const canonRegex = new RegExp(canonSource, match.flags);'
          )
          new = (
              "    // The input is a RegExp supplied by trusted plugin/developer code; only Vencord's fixed placeholder is expanded.\n"
              '    const canonRegex = new RegExp(canonSource, match.flags); // codeql[js/regex-injection]'
          )
          if text.count(old) != 1:
              raise SystemExit(f"Expected exactly one match in {patches}")
          patches.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/one-time-inline-codeql.yml

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/plugins/devCompanion.dev/index.tsx src/utils/patches.ts .github/workflows/one-time-inline-codeql.yml
          git commit -m "security: bind CodeQL suppressions to sink lines"
          git push origin HEAD:security/inline-codeql-suppressions
