name: One-time resolve upstream merge

on:
  push:
    branches:
      - sync/upstream-merge-2026-07-07

permissions:
  contents: write

jobs:
  resolve-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: sync/upstream-merge-2026-07-07
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Merge upstream and resolve known conflicts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Vendicated/Vencord.git
          git fetch upstream main

          set +e
          git merge --no-ff --no-commit upstream/main
          merge_status=$?
          set -e

          if [ "$merge_status" -eq 0 ]; then
            echo "Expected the known conflict set, but merge completed without conflicts" >&2
            exit 1
          fi

          actual_conflicts="$(git diff --name-only --diff-filter=U | sort)"
          expected_conflicts="$(printf '%s\n' \
            '.github/workflows/publish.yml' \
            'package.json' \
            'packages/discord-types/package.json' \
            'pnpm-lock.yaml' \
            'pnpm-workspace.yaml' | sort)"

          if [ "$actual_conflicts" != "$expected_conflicts" ]; then
            echo "Unexpected conflict set" >&2
            echo "Expected:" >&2
            printf '%s\n' "$expected_conflicts" >&2
            echo "Actual:" >&2
            printf '%s\n' "$actual_conflicts" >&2
            exit 1
          fi

          # Preserve the fork's least-privilege workflow permissions, Moment 2.30.1,
          # removal of zip-local, and pnpm security overrides.
          git checkout --ours -- \
            .github/workflows/publish.yml \
            package.json \
            packages/discord-types/package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml

          git add \
            .github/workflows/publish.yml \
            package.json \
            packages/discord-types/package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml

          rm -f UPSTREAM_MERGE_CONFLICTS.txt
          git add -A

          pnpm install --lockfile-only --ignore-scripts
          git add pnpm-lock.yaml

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain" >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi

          git commit -m "Merge upstream Vendicated/Vencord main"

      - name: Remove one-time workflow and push
        shell: bash
        run: |
          rm .github/workflows/one-time-resolve-upstream.yml
          git add .github/workflows/one-time-resolve-upstream.yml
          git commit -m "chore: remove one-time upstream resolver"
          git push origin HEAD:sync/upstream-merge-2026-07-07
