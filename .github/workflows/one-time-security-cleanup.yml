name: One-time security cleanup

on:
  push:
    branches:
      - security/finish-alert-cleanup

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: security/finish-alert-cleanup
          fetch-depth: 0

      - name: Apply deterministic cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source_path = Path("src/plugins/devCompanion.dev/index.tsx")
          source = source_path.read_text(encoding="utf-8")
          old_source = (
              "            // Dev Companion is a developer-only localhost protocol whose purpose includes testing replacement functions. codeql[js/code-injection]\n"
              "            // The evaluated function runs in Discord's browser sandbox; the companion process already has host access.\n"
              "            return (0, eval)(node.value);"
          )
          new_source = (
              "            // Dev Companion is a developer-only localhost protocol whose purpose includes testing replacement functions.\n"
              "            // The evaluated function runs in Discord's browser sandbox; the companion process already has host access. codeql[js/code-injection]\n"
              "            return (0, eval)(node.value);"
          )
          if source.count(old_source) != 1:
              raise SystemExit("Expected exactly one Dev Companion suppression block")
          source_path.write_text(source.replace(old_source, new_source, 1), encoding="utf-8")

          lock_path = Path("pnpm-lock.yaml")
          lock = lock_path.read_text(encoding="utf-8")

          caret_old = "      moment:\n        specifier: ^2.22.2\n        version: 2.30.1"
          caret_new = "      moment:\n        specifier: ^2.30.1\n        version: 2.30.1"
          if lock.count(caret_old) != 2:
              raise SystemExit("Expected two caret Moment importer entries")
          lock = lock.replace(caret_old, caret_new)

          exact_old = "      moment:\n        specifier: 2.22.2\n        version: 2.22.2"
          exact_new = "      moment:\n        specifier: 2.30.1\n        version: 2.30.1"
          if lock.count(exact_old) != 1:
              raise SystemExit("Expected one exact Moment importer entry")
          lock = lock.replace(exact_old, exact_new, 1)

          package_old = (
              "  moment@2.22.2:\n"
              "    resolution: {integrity: sha512-LRvkBHaJGnrcWvqsElsOhHCzj8mU39wLx5pQ0pc6s153GynCTsPdGdqsVNKAQD9sKnWj11iF7TZx9fpLwdD3fw==}\n\n"
          )
          if lock.count(package_old) != 1:
              raise SystemExit("Expected one Moment 2.22.2 package entry")
          lock = lock.replace(package_old, "", 1)

          snapshot_old = "  moment@2.22.2: {}\n\n"
          if lock.count(snapshot_old) != 1:
              raise SystemExit("Expected one Moment 2.22.2 snapshot entry")
          lock = lock.replace(snapshot_old, "", 1)

          forbidden = ("moment@2.22.2", "specifier: ^2.22.2", "specifier: 2.22.2")
          leftovers = [value for value in forbidden if value in lock]
          if leftovers:
              raise SystemExit(f"Stale Moment references remain: {leftovers}")

          lock_path.write_text(lock, encoding="utf-8")
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/one-time-security-cleanup.yml

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml src/plugins/devCompanion.dev/index.tsx .github/workflows/one-time-security-cleanup.yml
          git commit -m "security: finish alert cleanup"
          git push origin HEAD:security/finish-alert-cleanup
